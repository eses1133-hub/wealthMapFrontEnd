<div class="whole">
  <div class="left-box">
    <p>個人財務</p>
    <p>與資產配置平台</p>
  </div>
  <div class="right-box">
    <div class="right-content">
      <br>
      <h1>註 冊</h1>
      <div class="input-box">
        <label>姓 名</label><br><input type="text" (blur)="validate('name')"[(ngModel)]="name" placeholder="請輸入姓名">
        @if (nameErrorMsg) {
        <span class="error-msg" style="color: red; font-size: 12px;">
          {{ nameErrorMsg }}
        </span>
      }
      </div>

      <div class="input-box">
        <label>電子郵件</label><br><input type="email" (blur)="validate('email')" [(ngModel)]="email" placeholder="請輸入電子郵件">
         @if (emailErrorMsg) {
        <span class="error-msg" style="color: red; font-size: 12px;">
          {{ emailErrorMsg }}
        </span>
      }
      </div>

      <div class="input-box" style="position: relative;">
        <label>密 碼</label><br><input [type]="showPassword ? 'text' : 'password'"  (blur)="validate('password')" [(ngModel)]="password" placeholder="請輸入密碼">
        <button type="button" (click)="togglePassword()" style="background-color: white;border: none; position: absolute;right:40px;bottom: 16px;"><mat-icon class="custom-icon" aria-hidden="false" aria-label="Example home icon">{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon></button>
      @if (passwordErrorMsg) {
        <span class="error-msg" style="color: red; font-size: 12px;">
          {{ passwordErrorMsg }}
        </span>
      }

      </div>
      <div class="btn">
        <button (click)="register()" class="btn-google">登入</button>
      </div>
    </div>
  </div>


</div>
